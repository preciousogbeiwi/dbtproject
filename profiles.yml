prec_dbt_project:
  outputs:
    dev:
      account: '{{ env_var(''SNOWFLAKE_ACCOUNT'') }}'
      database: dbt_project_dev
      password: '{{ env_var(''SNOWFLAKE_PASSWORD'') }}'
      role: analytics_role
      schema: bronze
      threads: 1
      type: snowflake
      user: '{{ env_var(''SNOWFLAKE_USERNAME'') }}'
      warehouse: compute_wh
    
    prod:
      account: '{{ env_var(''SNOWFLAKE_ACCOUNT'') }}'
      database: dbt_project_prod
      password: '{{ env_var(''SNOWFLAKE_PASSWORD'') }}'
      role: analytics_role
      schema: bronze
      type: snowflake
      user: '{{ env_var(''SNOWFLAKE_USERNAME'') }}'
      warehouse: COMPUTE_WH
      
  target: dev
